type: beginner
questions:
  # 参加した理由
  motivation:
    # どうしてこのワークショップに参加しようと思いましたか？
    # どうしてOSSの開発に参加したいと思っていますか？
    # みんなのためとか世界のためとかでもよいですが、
    # 個人的な理由でもまったく問題ありません。
    # 自分の思っていることを大事にしたいのです。
    会社で働く時間以外に社会貢献できる時間を持ちたいと考えたため
  # 見つけた場所
  via:
    # どこでこのワークショップを知りましたか？
    AIに聞いて知りました。
  # 開発対象
  target:
    # ワークショップで開発対象に選んだOSSはなんですか？
    uv, postman-mcp-server（どちらも別の意味で難易度が高く、フィードバックには辿り着けませんでした。。）
  # 満足度
  satisfaction-rating:
    # ↓のうち当てはまるものだけを残してください。
    - 満足した（最終的にフィードバックに辿り着けず、自分の力不足で残念だったということです）
  # 想定との違い
  difference:
    # ↓のうち当てはまるものだけを残してください。
    - 想定より充実していた
  # 進行役について
  moderator:
    # 進行役はうまく進行できていましたか？
    # 進行役の説明はどうでしたか？
    # スライドの内容を理解するのに役立ちましたか？
    大変わかりやすく説明していただきました
  # サポートメンターについて
  support-mentor:
    # サポートメンターはサポーターがいないときの代役としてうまくフォローできていましたか？
    # サポートメンターはサポーターをうまくフォローできていましたか？
    今回はいらっしゃいませんでした
  # 次回のOSS Gateワークショップについて
  next:
    # (複数選択)↓のうち当てはまるものをすべて残してください。
    - ビギナーとして参加する
  # 今後のOSSの開発への参加について
  future:
    # ↓のうち当てはまるものだけを残してください。
    - 機会があれば開発に参加する
  # 今後のOSSの開発への参加の動機について
  future-motivation:
    # 今回のワークショップを終えた現時点で、今後のOSS開発への参加で
    # どういうことが動機になりそうだと思いますか？
    # みんなのためとか世界のためとかでもよいですが、
    # 個人的な理由でもまったく問題ありません。
    # (複数選択)↓のうち当てはまるものをすべて残してください。
    - 新しい技術に触れたい
    - 技術力を磨きたい/腕試ししたい
  # 今後のOSSの開発への参加の動機について：自由記入
  future-motivation-freeform:
    # ↑の選択肢に当てはまる物がなければ、こちらに説明を書いて下さい
    (ここに回答を改行を入れずに書いてください)
  # 次に変えて試すこと
  challenge-planning:
    # ワークショップの内容を何か1つだけ変えられるとしたら、
    # どんなことを試したいと思いますか？
    6時間は長時間なので、もう少し短時間（3-4時間）で進められる範囲で進めるという形で参加してみたいと思いました。
  # その他
  etc:
    # なにか思ったことがあれば自由に書いてください。
    課題を見つけることができたかと考えると、今回選択した課題はともに課題として難易度が高いものでした。課題になりそうなOSSの基準などを教えていただき、事前に課題を選択しておいたほうがよかったかもしれないと思いました。
